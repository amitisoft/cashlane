# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy ASP.Net Core app to Azure Web App - cashlane

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Restore
        run: dotnet restore Cashlane.Api/Cashlane.Api.csproj
        working-directory: ./backend

      - name: Build with dotnet
        run: dotnet build Cashlane.Api/Cashlane.Api.csproj --configuration Release --no-restore
        working-directory: ./backend

      - name: dotnet publish
        run: dotnet publish Cashlane.Api/Cashlane.Api.csproj -c Release --no-build -o ./publish
        working-directory: ./backend

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: .net-app
          path: backend/publish

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: .net-app
          path: ./publish
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_FDDD1D92840D474C972ACD080D0F7CA6 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_7357A872011B490E951A25C1051829FD }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_C327FB28034E4393B7EB812FA49098F9 }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'cashlane'
          slot-name: 'Production'
          package: ./publish
          
