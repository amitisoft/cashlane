name: Build and deploy ASP.Net Core app to Azure Web App - deploy-api

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - ".github/workflows/deploy-api.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore Cashlane.Api/Cashlane.Api.csproj
        working-directory: ./backend

      - name: Build with dotnet
        run: dotnet build Cashlane.Api/Cashlane.Api.csproj --configuration Release --no-restore
        working-directory: ./backend

      - name: dotnet publish
        run: dotnet publish Cashlane.Api/Cashlane.Api.csproj -c Release --no-build -o ./publish
        working-directory: ./backend

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: .net-app
          path: backend/publish

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: .net-app
          path: ./publish

      - name: Validate deployment configuration
        env:
          AZURE_WEBAPP_PUBLISH_PROFILE: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_CASHLANE_API }}
        run: |
          if [ -z "$AZURE_WEBAPP_PUBLISH_PROFILE" ]; then
            echo "Repository secret AZUREAPPSERVICE_PUBLISHPROFILE_CASHLANE_API is required."
            exit 1
          fi

      - name: Create deployment package
        run: |
          cd publish
          zip -r ../site.zip .

      - name: Deploy to Azure Web App
        shell: pwsh
        env:
          AZURE_WEBAPP_PUBLISH_PROFILE: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_CASHLANE_API }}
        run: |
          [xml]$xml = $env:AZURE_WEBAPP_PUBLISH_PROFILE
          $profile = $xml.publishData.publishProfile | Where-Object { $_.publishMethod -eq 'ZipDeploy' } | Select-Object -First 1

          if (-not $profile) {
            throw 'ZipDeploy publish profile not found.'
          }

          $pair = "{0}:{1}" -f $profile.userName, $profile.userPWD
          $basic = [Convert]::ToBase64String([Text.Encoding]::ASCII.GetBytes($pair))
          $headers = @{ Authorization = "Basic $basic" }
          $response = Invoke-WebRequest `
            -Uri ("https://{0}/api/zipdeploy" -f $profile.publishUrl) `
            -Method Post `
            -Headers $headers `
            -InFile (Join-Path $PWD 'site.zip') `
            -ContentType 'application/zip'

          $statusCode = [int]$response.StatusCode

          if ($statusCode -ne 200 -and $statusCode -ne 202) {
            throw "ZipDeploy failed with HTTP $statusCode."
          }
