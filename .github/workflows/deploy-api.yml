name: Deploy API

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - ".github/workflows/deploy-api.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Validate deployment configuration
        run: |
          if [ -z "${{ vars.CASHLANE_AZURE_WEBAPP_NAME }}" ]; then
            echo "Repository variable CASHLANE_AZURE_WEBAPP_NAME is required."
            exit 1
          fi
          if [ -z "${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_CASHLANE_API }}" ]; then
            echo "Repository secret AZUREAPPSERVICE_PUBLISHPROFILE_CASHLANE_API is required."
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore API
        run: dotnet restore backend/Cashlane.Api/Cashlane.Api.csproj

      - name: Publish API
        run: dotnet publish backend/Cashlane.Api/Cashlane.Api.csproj -c Release -o "${{ github.workspace }}/publish" /p:UseAppHost=false

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.CASHLANE_AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_CASHLANE_API }}
          package: ${{ github.workspace }}/publish
