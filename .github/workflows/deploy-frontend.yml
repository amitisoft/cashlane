name: Deploy Frontend

on:
  push:
    branches:
      - main
    paths:
      - "frontend/**"
      - ".github/workflows/deploy-frontend.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Validate deployment configuration
        run: |
          if [ -z "${{ vars.CASHLANE_API_BASE_URL }}" ]; then
            echo "Repository variable CASHLANE_API_BASE_URL is required."
            exit 1
          fi
          if [ -z "${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_CASHLANE_FRONTEND }}" ]; then
            echo "Repository secret AZURE_STATIC_WEB_APPS_API_TOKEN_CASHLANE_FRONTEND is required."
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build and deploy Static Web App
        uses: Azure/static-web-apps-deploy@v1
        env:
          VITE_API_BASE_URL: ${{ vars.CASHLANE_API_BASE_URL }}
        with:
          action: upload
          app_location: "frontend"
          output_location: "dist"
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_CASHLANE_FRONTEND }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
